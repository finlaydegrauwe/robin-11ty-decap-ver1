    {% if collections.interviews %}

        {% for post in collections.interviews | reverse %}
            <a href="{{post.url}}">
                <img width="{{ ["211px", "221px", "231px", "245px", "252px"] | random }}" src="{{ post.data.thumbnail }}" alt="{{ post.data.title }}" class="rounded-xs" style="padding-right: {{ ["1%", "4%", "6%", "8%", "11%"] | random }};">
            </a>
        {% endfor %}

    {% endif %}
